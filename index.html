  <script type="text/babel" src="Sections.jsx"></script>

  <script type="text/babel">
    const mount = () => {
      if (!window.App2 || !window.HeroV2 || !window.AboutStrip || !window.ExperienceV2
          || !window.Capabilities || !window.WorkV2 || !window.Statement
          || !window.ChatV2 || !window.EducationV2 || !window.ContactV2
          || !window.FooterV2 || !window.TweaksV2) {
        return setTimeout(mount, 30);
      }
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App2 initialTweaks={window.__INITIAL_TWEAKS_V2} />);
    };
    mount();
  </script>
